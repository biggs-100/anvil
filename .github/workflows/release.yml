name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --bin anvil

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist/anvil
          cp target/release/anvil dist/anvil/anvil
          cp README.md LICENSE dist/anvil/
          cd dist
          tar czf anvil-${{ matrix.target }}.tar.gz anvil/

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist\anvil
          copy target\release\anvil.exe dist\anvil\anvil.exe
          copy README.md dist\anvil\
          copy LICENSE dist\anvil\
          cd dist
          Compress-Archive -Path anvil -DestinationPath anvil-${{ matrix.target }}.zip

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: anvil-${{ matrix.target }}
          path: dist/anvil-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: anvil-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: anvil-*
          generate_release_notes: true
