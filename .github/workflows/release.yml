name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --bin forge-cli

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist/forge
          cp target/release/forge-cli dist/forge/forge
          cp README.md LICENSE dist/forge/
          cd dist
          tar czf forge-${{ matrix.target }}.tar.gz forge/

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist\forge
          copy target\release\forge-cli.exe dist\forge\forge.exe
          copy README.md dist\forge\
          copy LICENSE dist\forge\
          cd dist
          Compress-Archive -Path forge -DestinationPath forge-${{ matrix.target }}.zip

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: forge-${{ matrix.target }}
          path: dist/forge-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: forge-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: forge-*
          generate_release_notes: true
